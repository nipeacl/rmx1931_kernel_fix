name: Build RMX1931 Kernel (GCC 4.9 CAF)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential curl flex git liblz4-tool \
            libncurses5-dev libssl-dev libxml2-utils lzop \
            rsync squashfs-tools xsltproc zip zlib1g-dev \
            libelf-dev device-tree-compiler \
            cpio python3 2>&1 | tail -3

      - name: Clone CAF GCC 4.9 toolchain
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            toolchain 2>&1 | tail -3
          echo "Toolchain ready"
          ls toolchain/bin/aarch64-linux-android-* | head -5
          # Create real- symlinks for gcc-wrapper compatibility
          cd toolchain/bin
          for f in aarch64-linux-android-*; do
            if [ ! -f "real-$f" ]; then
              ln -sf "$f" "real-$f"
            fi
          done
          echo "real- symlinks created"

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b lineage-20 \
            https://github.com/HyperTeam/android_kernel_realme_sm8150 \
            kernel_source

      - name: Apply charger fix
        run: |
          python3 ${{ github.workspace }}/apply_patch1.py \
            kernel_source/drivers/power/oppo/oplus_charger.c

      - name: Configure
        run: |
          export PATH=${{ github.workspace }}/toolchain/bin:$PATH
          cd kernel_source
          make CC=aarch64-linux-android-gcc REAL_CC=aarch64-linux-android-gcc O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-android- samurai_defconfig 2>&1 | tail -1
          python3 ${{ github.workspace }}/fix_config.py out/.config
          yes '' | make CC=aarch64-linux-android-gcc REAL_CC=aarch64-linux-android-gcc O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-android- olddefconfig 2>&1 | tail -1
          # Fix GCC 4.9 compatibility issues
          sed -i '/^#elif$/s//#else/' kernel/taskstats.c 2>/dev/null || true
          # Fix techpack/audio format warnings (GCC 4.9 -Werror=format)
          sed -i 's/"%d\\b/"%zu/g' techpack/audio/dsp/q6afe.c 2>/dev/null || true
          # Fix sm8150.c format issues - we'll add -Wno-error=format for this specific dir
          echo '# GCC 4.9 format compat for techpack/audio' >> techpack/audio/Makefile
          echo 'KBUILD_CFLAGS += -Wno-error=format' >> techpack/audio/Makefile

      - name: Build kernel
        run: |
          export PATH=${{ github.workspace }}/toolchain/bin:$PATH
          cd kernel_source
          N=$(nproc); [ $N -gt 4 ] && N=4
          make CC=aarch64-linux-android-gcc REAL_CC=aarch64-linux-android-gcc O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-android- -j$N 2>&1 | tee build.log | tail -5; MSTATUS=${PIPESTATUS[0]}
          grep -E "error:|Error|fatal:" build.log | head -10; exit $MSTATUS

      - name: Repack boot.img
        run: |
          echo "=== Boot dir contents ==="
          find kernel_source/out -name "Image*" -o -name "vmlinux*" 2>/dev/null | head -10
          echo "=== arch/arm64/boot ==="
          ls -la kernel_source/out/arch/arm64/boot/ 2>/dev/null || echo "DIR NOT FOUND"
          echo "=== Searching for any kernel image ==="
          KERNEL=$(find kernel_source/out -name "Image.gz-dtb" -o -name "Image" -o -name "Image.gz" 2>/dev/null | head -1)
          if [ -z "$KERNEL" ]; then
            echo "WARNING: No kernel image found. Build may have failed silently."
            ls kernel_source/out/arch/arm64/ 2>/dev/null
            exit 1
          fi
          cp "$KERNEL" Image.gz-dtb
          python3 ${{ github.workspace }}/repack_boot.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rmx1931_boot_patched
          path: |
            boot_patched.img
            Image.gz-dtb
